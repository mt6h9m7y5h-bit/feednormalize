# Fly.io deployment (optional). Rename `app` before first deploy:
#   fly apps create your-feednormalize-name
#   fly secrets set DATABASE_URL=postgres://...
#   fly deploy

app = "feednormalize"
primary_region = "ams"

[build]

[env]
  HOST = "0.0.0.0"
  PORT = "3000"
  RUST_LOG = "info"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
